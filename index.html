<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Late Fee</title>
    <style>
      /* ── Reset & base ───────────────────────────────── */
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      /* Mobile: TV wrapper is invisible, screen fills viewport */
      #tv { display: contents; }

      #tv-screen {
        width: 100vw;
        height: 100vh;
      }

      #tv-controls { display: none; }

      canvas { display: block; touch-action: none; }

      /* ── Desktop CRT frame ──────────────────────────── */
      @media (min-width: 580px) and (min-height: 720px) {

        /* Dark wood-panel room behind the TV */
        body {
          background-color: #110a03;
          background-image:
            repeating-linear-gradient(
              89deg,
              transparent 0px, transparent 5px,
              rgba(150, 70, 5, 0.04) 5px, rgba(150, 70, 5, 0.04) 6px
            ),
            repeating-linear-gradient(
              91deg,
              transparent 0px, transparent 20px,
              rgba(0, 0, 0, 0.08) 20px, rgba(0, 0, 0, 0.08) 22px
            );
        }

        /* Outer TV shell — dark charcoal plastic */
        #tv {
          display: flex;
          flex-direction: column;
          align-items: center;
          position: relative;
          background:
            repeating-linear-gradient(
              135deg,
              transparent 0px, transparent 3px,
              rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px
            ),
            linear-gradient(180deg, #2e2e2e 0%, #262626 50%, #202020 100%);
          border-radius: 22px 22px 30px 30px;
          padding: 22px 28px 56px;
          box-shadow:
            inset 0  3px 0   rgba(255,255,255,0.09),
            inset -3px 0 0   rgba(255,255,255,0.04),
            inset 0 -2px 0   rgba(0,0,0,0.5),
            inset  3px 0 0   rgba(0,0,0,0.25),
            0  30px 90px rgba(0,0,0,0.85),
            0   8px 24px rgba(0,0,0,0.8);
        }

        /* Inner bezel ridge around the screen */
        #tv::before {
          content: '';
          position: absolute;
          inset: 14px;
          border-radius: 16px 16px 24px 24px;
          box-shadow:
            inset 0 0 0 2px rgba(0,0,0,0.45),
            inset 0 0 0 3px rgba(255,255,255,0.04);
          pointer-events: none;
        }

        /* ── Screen ─────────────────────────────────── */
        #tv-screen {
          position: relative;
          /* Scale to fit the viewport leaving room for the bezel */
          --sh: min(76vh, 680px);
          height: var(--sh);
          width: calc(var(--sh) * 480 / 854);
          border-radius: 6px;
          overflow: hidden;
          /* Phosphor glow + inset shadow */
          box-shadow:
            inset 0 0 0 2px rgba(0,0,0,0.95),
            inset 0 0 30px rgba(0,0,0,0.5),
            0 0  50px rgba(0, 190,  80, 0.13),
            0 0 110px rgba(0, 100,  40, 0.07);
        }

        /* Vignette — edges go dark like a real CRT */
        #tv-screen::before {
          content: '';
          position: absolute;
          inset: 0;
          background: radial-gradient(
            ellipse at 50% 50%,
            transparent 52%,
            rgba(0,0,0,0.6) 100%
          );
          pointer-events: none;
          z-index: 10;
          border-radius: inherit;
        }

        /* Scanlines */
        #tv-screen::after {
          content: '';
          position: absolute;
          inset: 0;
          background: repeating-linear-gradient(
            0deg,
            transparent       0px,
            transparent       2px,
            rgba(0,0,0,0.07)  2px,
            rgba(0,0,0,0.07)  4px
          );
          pointer-events: none;
          z-index: 11;
          border-radius: inherit;
        }

        /* ── Controls bar (below screen, inside bezel) ── */
        #tv-controls {
          display: flex;
          align-items: center;
          justify-content: space-between;
          position: absolute;
          bottom: 14px;
          left: 36px;
          right: 36px;
        }

        .tv-knob-wrap {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 4px;
        }

        .tv-knob {
          width: 26px;
          height: 26px;
          border-radius: 50%;
          position: relative;
          background: radial-gradient(circle at 35% 32%, #3c3c3c, #181818);
          box-shadow:
            0 3px 7px rgba(0,0,0,0.7),
            inset 0 1px 2px rgba(255,255,255,0.08);
          cursor: default;
        }

        /* Knob indicator line */
        .tv-knob::after {
          content: '';
          position: absolute;
          top: 50%;
          left: 50%;
          width: 2px;
          height: 9px;
          background: rgba(255,255,255,0.22);
          border-radius: 1px;
          transform: translate(-50%, -115%) rotate(-20deg);
        }

        .knob-label {
          font-family: Arial, Helvetica, sans-serif;
          font-size: 7px;
          color: #3a3a3a;
          letter-spacing: 1px;
          user-select: none;
        }

        #tv-brand-wrap {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 6px;
        }

        #tv-brand {
          font-family: "Arial Narrow", Arial, Helvetica, sans-serif;
          font-size: 9px;
          font-weight: 700;
          letter-spacing: 5px;
          color: #363636;
          text-shadow: 0 1px 0 rgba(255,255,255,0.06);
          user-select: none;
        }

        /* Power LED */
        #tv-led {
          width: 7px;
          height: 7px;
          border-radius: 50%;
          background: radial-gradient(circle at 35% 35%, #88ff99, #00bb44);
          box-shadow: 0 0 6px #00cc44, 0 0 14px rgba(0, 200, 60, 0.5);
        }

      } /* end @media */
    </style>
  </head>
  <body>
    <div id="tv">
      <div id="tv-screen"></div>
      <div id="tv-controls">
        <div class="tv-knob-wrap">
          <div class="tv-knob"></div>
          <span class="knob-label">VOL</span>
        </div>
        <div id="tv-brand-wrap">
          <span id="tv-brand">RENTOVISION</span>
          <div id="tv-led"></div>
        </div>
        <div class="tv-knob-wrap">
          <div class="tv-knob"></div>
          <span class="knob-label">CH</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
